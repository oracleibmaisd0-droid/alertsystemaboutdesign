<style>
body{
  zoom: 0.8;
  margin:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  height:100vh;
  font-family:system-ui;
}

#viewer{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

svg{
  width:240px;
  height:240px;
}

#buttons{
  display:flex;
  gap:16px;
  padding:20px;
  overflow-x: auto;
  overflow-y: hidden;
  max-width: 100vw;
  flex-wrap: nowrap;
  -webkit-overflow-scrolling: touch;
}

button{
  width:70px;
  height:37px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.25s;
}

button:hover{ transform:scale(2); }
  
  black {
    
  }
</style>
</head>

<body>

<div id="viewer">
  <svg viewBox="0 0 100 100">
    <path id="main" fill="#5f5f5f"
      d="M14 50 Q14 44 22 44 H78 Q86 44 86 50 Q86 56 78 56 H22 Q14 56 14 50 Z"/>
  </svg>
</div>

<div id="buttons">
  <button onclick="morphTo('forbidden')" style="background:#111">
    ⛔
  </button>
  <button onclick="morphTo('alert')" style="background:#300">
    🚨
  </button>
  <button onclick="morphTo('stop')" style="background:#300">
    🛑
  </button>
  <button onclick="morphTo('square')" style="background:#300">
    ❌
  </button>
  <button onclick="morphTo('rombo')" style="background:#320">
    ❗
  </button>
  <button onclick="morphTo('triangle')" style="background:#330">
    ⚠️
  </button>
  <button onclick="morphTo('circle')" style="background:#030">
    ✅
  </button>
  <button onclick="morphTo('question')" style="background:#003">
    ❓
  </button>
  <button onclick="morphTo('info')" style="background:#003">
    ℹ️
  </button>
  <button onclick="morphTo('load')" style="background:#003">
    🔄
  </button>
</div>

<svg width="0" height="0" style="position:absolute">
<defs>

 <!-- ⚫ NEGRO -->
<path id="forbidden" fill="#5f5f5f"
d="M14 50 Q14 44 22 44 H78 Q86 44 86 50 Q86 56 78 56 H22 Q14 56 14 50 Z"/>

a4 4 0 0 1 4 -4
Z
M22 20
A44 44 0 0 0 22 80
a4 4 0 0 0 4 -4
A36 36 0 0 1 26 24
a4 4 0 0 0 -4 -4
Z
M37 30
A29 29 0 0 0 37 70
a4 4 0 0 0 4 -4

a4 4 0 0 0 -4 -4

<!-- 🔴 ROJO -->

<!-- 🟠 NARANJA -->

<!-- 🟢 VERDE -->

</svg>

<script>
function morphTo(id){
  const target = document.querySelector('#'+id);

  gsap.to('#main',{
    duration:1,
    morphSVG:target,
    fill:target.getAttribute('fill'),
    ease:"expo.inOut"
  });
}
</script>

</body>
